<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Browser</title>
    <!-- GitHub Markdown Light CSS for accurate light-themed document rendering -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown-light.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Highlight.js CSS with GitHub Light style for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Modularized custom styles -->
    <link rel="stylesheet" href="/style.css" />
</head>
<body>

    <!-- Sidebar pane -->
    <aside>
        <div class="sidebar-header">
            <div class="brand">
                <!-- Book/Markdown SVG Icon -->
                <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true">
                    <path d="M0 1.75A.75.75 0 0 1 .75 1h4.25c.974 0 1.91.444 2.525 1.203C8.139 1.444 9.076 1 10.05 1h4.25a.75.75 0 0 1 .75.75v11.5a.75.75 0 0 1-.75.75h-3.905a21.012 21.012 0 0 0-2.391-.122 20.932 20.932 0 0 0-2.391.122H.75a.75.75 0 0 1-.75-.75V1.75zM5.75 12H1.5V2.5h4.25a3.25 3.25 0 0 1 3 2.192 3.75 3.75 0 0 0-1.5-.192H5.75V12zM10 4.5a3.25 3.25 0 0 1 3-2.192h4.25V12h-4.25a3.75 3.75 0 0 0-1.5.192V4.5z"></path>
                </svg>
                <span>MD Browser</span>
            </div>
            <div class="search-box-container" style="position: relative; width: 100%;">
                <input type="text" id="search-input" placeholder="Search Markdown files..." style="width: 100%; padding: 6px 32px 6px 10px; border-radius: 6px; border: 1px solid var(--border-color); background-color: var(--bg-color); color: var(--text-color); font-size: 0.85rem; outline: none; font-family: inherit;" />
                <button id="btn-search-clear" class="hidden" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0; display: inline-flex; align-items: center; justify-content: center;">
                    <!-- Simple Clear X Icon -->
                    <svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor">
                        <path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.75.75 0 1 1-1.06 1.06L9.06 8l3.22 3.22a.75.75 0 1 1-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 1 1-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06z"/>
                    </svg>
                </button>
            </div>
            <div class="controls">
                <div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <input type="checkbox" id="toggle-all" />
                        <label for="toggle-all">Show all files</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <input type="checkbox" id="toggle-autofresh" />
                        <label for="toggle-autofresh">Auto-refresh</label>
                    </div>
                </div>
                <div class="tree-actions">
                    <button class="action-link" id="btn-expand-all">Expand all</button>
                    <span class="divider">|</span>
                    <button class="action-link" id="btn-collapse-all">Collapse all</button>
                    <span class="divider">|</span>
                    <button class="action-link" id="btn-refresh">Refresh</button>
                </div>
            </div>
        </div>
        <div class="tree-container" id="tree-container">
            <!-- File Tree will be dynamically loaded here -->
        </div>
        <div class="tree-container hidden" id="search-results-container">
            <!-- Search Results will be dynamically loaded here -->
        </div>
    </aside>

    <!-- Main Content Pane -->
    <main>
        <!-- Empty placeholder view -->
        <div class="placeholder-state" id="placeholder-view">
            <svg viewBox="0 0 24 24" width="80" height="80" fill="currentColor">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
            </svg>
            <h2>No Markdown File Selected</h2>
            <p>Select a markdown file from the left navigation tree to view its beautifully parsed content in real-time.</p>
        </div>

        <!-- Rendered Markdown view -->
        <div class="hidden" id="markdown-view" style="display: flex; flex-direction: column; height: 100%; overflow: hidden;">
            <div class="view-header">
                <div class="file-path" id="file-path-display">/readme.md</div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn hidden" id="btn-toggle-source">
                        <span>View Source</span>
                    </button>
                    <button class="btn" id="btn-copy">
                        <span>Copy Path</span>
                    </button>
                </div>
            </div>
            <div class="content-scroller">
                <div class="markdown-container" id="markdown-content">
                    <!-- Rendered HTML content goes here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Highlight.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Modularized custom application logic -->
    <script src="/app.js" defer></script>
</body>
</html>
